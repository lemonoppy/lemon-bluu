name: PBE Portal Scraper

on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Season number (e.g. 61)'
        required: true
        default: '61'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create config.json
        env:
          PBE_USERNAME: ${{ secrets.PBE_USERNAME }}
          PBE_PASSWORD: ${{ secrets.PBE_PASSWORD }}
          PBE_LOGIN_URL: ${{ secrets.PBE_LOGIN_URL }}
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync(
              'tools/pbe-portal-scraper/config.json',
              JSON.stringify({
                username: process.env.PBE_USERNAME,
                password: process.env.PBE_PASSWORD,
                loginUrl: process.env.PBE_LOGIN_URL,
              }, null, 2)
            );
          "

      - name: Run scraper
        env:
          SEASON: ${{ inputs.season }}
        run: yarn workspace @lemon-bluu/pbe-portal-scraper scrape

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            tools/pbe-portal-scraper/debug-login.png
            tools/pbe-portal-scraper/debug-login.html
          if-no-files-found: ignore

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: drafted-players-s${{ inputs.season }}
          path: tools/pbe-portal-scraper/drafted-players-s${{ inputs.season }}.json
          if-no-files-found: error
